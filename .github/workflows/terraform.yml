name: Terraform

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::604227045332:role/TerraformExecutionRole
          aws-region: ap-northeast-2

      - name: Terraform Init
        run: terraform init
      - name: Terraform State List
        run: terraform state list
      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Install session-manager-plugin
        run: |
                curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
                sudo dpkg -i session-manager-plugin.deb

      - name: Install Ansible & boto3
        run: |
                pip install ansible boto3 botocore

      - name: Run Ansible via SSM
        run: |
                INSTANCE_ID=$(terraform output -raw ec2_id)
                ansible-playbook -i inventory.yml playbook.yml -e "instance_id=$INSTANCE_ID"