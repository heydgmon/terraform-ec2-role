name: Terraform

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# 같은 브랜치에서 새 push가 오면 이전 실행을 취소해 러너/시간 낭비 방지
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 캐시: Terraform provider 플러그인 ────────────────────
      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-providers-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: tf-providers-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false   # terraform output -raw 파싱을 위해 wrapper 비활성화

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      # ── Python + pip 캐시 (ansible/boto3) ───────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── AWS 자격증명 (OIDC) ─────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::604227045332:role/TerraformExecutionRole
          aws-region: ap-northeast-2

      # ── Terraform ───────────────────────────────────────────
      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          code=$?
          set -e
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          # 0=변경없음, 1=에러, 2=변경있음
          if [ "$code" = "1" ]; then
            echo "terraform plan failed"
            exit 1
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2'
        run: terraform apply -auto-approve tfplan

      # ── Ansible 준비물 ──────────────────────────────────────
      - name: Cache session-manager-plugin
        id: cache-ssm
        uses: actions/cache@v4
        with:
          path: session-manager-plugin.deb
          key: ssm-plugin-v1

      - name: Download session-manager-plugin
        if: steps.cache-ssm.outputs.cache-hit != 'true'
        run: curl -s "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o session-manager-plugin.deb

      - name: Install session-manager-plugin
        run: sudo dpkg -i session-manager-plugin.deb

      - name: Install Ansible & boto3
        run: pip install ansible boto3 botocore

      # ── SSM 준비 대기 후 Ansible 실행 (항상 실행: 멱등적) ──────
      - name: Wait for SSM to come online
        run: |
          INSTANCE_ID=$(terraform output -raw ec2_id)
          echo "Waiting for instance $INSTANCE_ID to register with SSM..."
          aws ssm wait instance-online --instance-information-filter-list key=InstanceIds,valueSet=$INSTANCE_ID \
            || aws ssm wait instance-online --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            || sleep 30

      - name: Run Ansible via SSM
        run: |
          INSTANCE_ID=$(terraform output -raw ec2_id)
          ansible-playbook -i inventory.yml playbook.yml -e "instance_id=$INSTANCE_ID"