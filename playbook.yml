- hosts: all
  gather_facts: false
  tasks:
    - name: Wait for SSM connection
      wait_for_connection:
        timeout: 300
        sleep: 10

- hosts: all
  become: yes
  tasks:
    - name: Update packages
      dnf:
        name: "*"
        state: latest

    - name: Install git and yum-utils
      dnf:
        name:
          - git
          - yum-utils
        state: present

    - name: Add HashiCorp repo
      command: dnf config-manager --add-repo https://rpm.releases.hashicorp.com/AmazonLinux/hashicorp.repo
      args:
        creates: /etc/yum.repos.d/hashicorp.repo

    - name: Install Terraform
      dnf:
        name: terraform
        state: present
